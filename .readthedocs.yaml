version: 2

formats:
  - htmlzip
  - pdf

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - doxygen
    - cmake
    - gcc
    - g++
    - git
  jobs:
    pre_build:
      - doxygen Doxyfile

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py
