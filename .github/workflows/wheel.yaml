name: Wheel Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: wheels_linux
          - os: macos-latest
            artifact_name: wheels_macos_arm64
          - os: macos-15-intel
            artifact_name: wheels_macos_x86_64
          - os: windows-2022
            artifact_name: wheels_windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel

      - name: Build and test wheels
        run: python -m cibuildwheel --output-dir dist
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "pp* *-musllinux_*"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_TEST_COMMAND: "python {project}/tests/test.py"
          CIBW_ENVIRONMENT: >-
            CMAKE_ARGS="-DBUILD_PYTHON=ON"
            SKBUILD_CONFIGURE_OPTIONS="-DBUILD_PYTHON=ON"
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=10.15
            CMAKE_ARGS="-DBUILD_PYTHON=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15"
            SKBUILD_CONFIGURE_OPTIONS="-DBUILD_PYTHON=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          overwrite: true
          retention-days: 7
