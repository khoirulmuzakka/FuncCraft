name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"
            platform-name: linux
          - os: macos-latest
            python-version: "3.14"
            platform-name: macos_arm
          - os: windows-2022
            python-version: "3.14"
            platform-name: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pybind11

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" -DBUILD_LIBRARY=ON -DBUILD_PYTHON=ON -DBUILD_TEST=ON -DBUILD_EXAMPLES=OFF

      - name: Build C++ and Python targets
        run: cmake --build build --target funccraft --target _funccraft --target funccraft_test --config Release

      - name: Run C++ smoke test
        run: ctest --test-dir build --output-on-failure -C Release
        if: runner.os != 'Windows'

      - name: Run C++ smoke test (Windows)
        run: ctest --test-dir build --output-on-failure -C Release
        if: runner.os == 'Windows'

      - name: Run Python smoke test
        run: |
          python tests/test.py

      - name: Generate cross-platform value table
        run: ./bin/funccraft_test --generate-values "${{ matrix.platform-name }}" "values_${{ matrix.platform-name }}.txt"
        if: runner.os != 'Windows'

      - name: Generate cross-platform value table (Windows)
        run: .\bin\funccraft_test.exe --generate-values "${{ matrix.platform-name }}" "values_${{ matrix.platform-name }}.txt"
        if: runner.os == 'Windows'

      - name: Upload cross-platform value table
        uses: actions/upload-artifact@v4
        with:
          name: values-${{ matrix.platform-name }}
          path: values_${{ matrix.platform-name }}.txt
          overwrite: true
          retention-days: 1

      - name: Python build
        run: python -m build

  compare-values:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download cross-platform value tables
        uses: actions/download-artifact@v4
        with:
          pattern: values-*
          path: value_tables
          merge-multiple: true

      - name: Compare cross-platform value tables
        run: python tests/compare_values.py value_tables/values_linux.txt value_tables/values_macos_arm.txt value_tables/values_windows.txt --tolerance 1e-7
